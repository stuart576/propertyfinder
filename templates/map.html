<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property Finder — Map</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <style>
        :root {
            --bg: #f5f2ed;
            --bg-card: #ffffff;
            --bg-dark: #2c2c2c;
            --text: #2c2c2c;
            --text-muted: #7a7568;
            --text-light: #a09a8e;
            --accent: #4a7c59;
            --accent-light: #e8f0ea;
            --accent-hover: #3d6649;
            --border: #e2ddd5;
            --star: #d4a843;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.06);
            --radius: 10px;
            --radius-sm: 6px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
        }

        .header {
            background: var(--bg-dark);
            color: white;
            padding: 1.25rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header h1 {
            font-family: 'DM Serif Display', serif;
            font-size: 1.5rem;
            font-weight: 400;
            letter-spacing: 0.02em;
        }

        .header h1 span { color: var(--accent); }

        .header-actions {
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.5rem 1rem;
            border: none;
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 0.825rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s ease;
            text-decoration: none;
        }

        .btn-ghost {
            background: rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.8);
            border: 1px solid rgba(255,255,255,0.15);
        }
        .btn-ghost:hover {
            background: rgba(255,255,255,0.18);
            color: white;
        }
        .btn-ghost.active {
            background: rgba(255,255,255,0.2);
            color: white;
            border-color: rgba(255,255,255,0.3);
        }

        .map-info {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.6rem 2rem;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            font-size: 0.825rem;
            color: var(--text-muted);
        }

        .map-info strong {
            color: var(--text);
        }

        #map {
            height: calc(100vh - 110px);
            width: 100%;
        }

        /* Popup styling */
        .property-popup {
            min-width: 240px;
            max-width: 280px;
            font-family: 'DM Sans', sans-serif;
        }

        .property-popup img {
            width: 100%;
            height: 130px;
            object-fit: cover;
            border-radius: var(--radius-sm);
            margin-bottom: 0.5rem;
        }

        .property-popup .popup-price {
            font-family: 'DM Serif Display', serif;
            font-size: 1.15rem;
            color: var(--accent);
            margin-bottom: 0.15rem;
        }

        .property-popup .popup-title {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text);
            line-height: 1.35;
            margin-bottom: 0.4rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .property-popup .popup-meta {
            font-size: 0.72rem;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
        }

        .property-popup .popup-source {
            display: inline-block;
            background: var(--bg-dark);
            color: white;
            font-size: 0.6rem;
            padding: 0.1rem 0.35rem;
            border-radius: 3px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            font-weight: 600;
            margin-bottom: 0.4rem;
        }

        .property-popup a {
            display: inline-block;
            font-size: 0.78rem;
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }
        .property-popup a:hover { text-decoration: underline; }

        /* Starred marker */
        .starred-marker {
            filter: hue-rotate(200deg) saturate(1.5);
        }

        @media (max-width: 768px) {
            .header { padding: 1rem; }
            .map-info { padding: 0.5rem 1rem; }
            #map { height: calc(100vh - 100px); }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>Property <span>Finder</span></h1>
    <div class="header-actions">
        <a href="/" class="btn btn-ghost">Grid View</a>
        <a href="/map" class="btn btn-ghost active">Map View</a>
        <a href="/emails" class="btn btn-ghost">Emails</a>
    </div>
</div>

<div class="map-info">
    <span>Showing <strong>{{ properties|length }}</strong> properties on map</span>
    {% if stats.active > properties|length %}
    <span>({{ stats.active - properties|length }} properties could not be mapped — missing postcode)</span>
    {% endif %}
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script>
    const map = L.map('map').setView([52.1, -2.7], 9);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
        maxZoom: 18,
    }).addTo(map);

    const markers = L.markerClusterGroup({
        maxClusterRadius: 40,
        spiderfyOnMaxZoom: true,
        showCoverageOnHover: false,
    });

    const starIcon = L.icon({
        iconUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png',
        iconRetinaUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon-2x.png',
        shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
        iconSize: [25, 41],
        iconAnchor: [12, 41],
        popupAnchor: [1, -34],
        shadowSize: [41, 41],
        className: 'starred-marker',
    });

    const properties = {{ properties | tojson }};

    properties.forEach(p => {
        const priceStr = p.price ? '£' + p.price.toLocaleString() : 'Price TBC';
        const imgHtml = (p.image_url && p.image_url !== 'none')
            ? `<img src="${p.image_url}" alt="" onerror="this.style.display='none'">`
            : '';

        const metaParts = [];
        if (p.bedrooms) metaParts.push(p.bedrooms + ' bed' + (p.bedrooms !== 1 ? 's' : ''));
        if (p.acres) metaParts.push(p.acres + ' acres');
        if (p.location) metaParts.push(p.location);

        const popup = `
            <div class="property-popup">
                ${imgHtml}
                <span class="popup-source">${p.source}</span>
                <div class="popup-price">${priceStr}</div>
                <div class="popup-title">${p.title || 'Untitled property'}</div>
                <div class="popup-meta">${metaParts.join(' · ')}</div>
                ${p.url ? `<a href="${p.url}" target="_blank" rel="noopener">View listing &rarr;</a>` : ''}
            </div>
        `;

        const opts = p.starred ? { icon: starIcon } : {};
        const marker = L.marker([p.latitude, p.longitude], opts).bindPopup(popup, { maxWidth: 300 });
        markers.addLayer(marker);
    });

    map.addLayer(markers);

    if (properties.length > 0) {
        map.fitBounds(markers.getBounds().pad(0.1));
    }
</script>
</body>
</html>
