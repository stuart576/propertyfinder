<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property Finder — Map</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <style>
        :root {
            --bg: #f5f2ed;
            --bg-card: #ffffff;
            --bg-dark: #2c2c2c;
            --text: #2c2c2c;
            --text-muted: #7a7568;
            --text-light: #a09a8e;
            --accent: #4a7c59;
            --accent-light: #e8f0ea;
            --accent-hover: #3d6649;
            --border: #e2ddd5;
            --star: #d4a843;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.06);
            --radius: 10px;
            --radius-sm: 6px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
        }

        .header {
            background: var(--bg-dark);
            color: white;
            padding: 1.25rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header h1 {
            font-family: 'DM Serif Display', serif;
            font-size: 1.5rem;
            font-weight: 400;
            letter-spacing: 0.02em;
        }

        .header h1 span { color: var(--accent); }

        .header-actions {
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.5rem 1rem;
            border: none;
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 0.825rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s ease;
            text-decoration: none;
        }

        .btn-ghost {
            background: rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.8);
            border: 1px solid rgba(255,255,255,0.15);
        }
        .btn-ghost:hover {
            background: rgba(255,255,255,0.18);
            color: white;
        }
        .btn-ghost.active {
            background: rgba(255,255,255,0.2);
            color: white;
            border-color: rgba(255,255,255,0.3);
        }

        .map-info {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.6rem 2rem;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            font-size: 0.825rem;
            color: var(--text-muted);
        }

        .map-info strong {
            color: var(--text);
        }

        #map {
            height: calc(100vh - 110px);
            width: 100%;
        }

        /* Popup styling */
        .property-popup {
            min-width: 240px;
            max-width: 280px;
            font-family: 'DM Sans', sans-serif;
        }

        .property-popup img {
            width: 100%;
            height: 130px;
            object-fit: cover;
            border-radius: var(--radius-sm);
            margin-bottom: 0.5rem;
        }

        .property-popup .popup-price {
            font-family: 'DM Serif Display', serif;
            font-size: 1.15rem;
            color: var(--accent);
            margin-bottom: 0.15rem;
        }

        .property-popup .popup-title {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text);
            line-height: 1.35;
            margin-bottom: 0.4rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .property-popup .popup-meta {
            font-size: 0.72rem;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
        }

        .property-popup .popup-source {
            display: inline-block;
            background: var(--bg-dark);
            color: white;
            font-size: 0.6rem;
            padding: 0.1rem 0.35rem;
            border-radius: 3px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            font-weight: 600;
            margin-bottom: 0.4rem;
        }

        .property-popup a {
            display: inline-block;
            font-size: 0.78rem;
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }
        .property-popup a:hover { text-decoration: underline; }

        /* Custom markers — remove divIcon background */
        .custom-marker {
            background: transparent;
            border: none;
        }
        .custom-marker svg {
            filter: drop-shadow(0 2px 3px rgba(0,0,0,0.35));
        }

        /* Legend */
        .map-legend {
            position: absolute;
            bottom: 1rem;
            right: 1rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 0.6rem 0.85rem;
            box-shadow: var(--shadow-sm);
            font-size: 0.75rem;
            z-index: 500;
            max-width: 180px;
        }

        .map-legend h4 {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-light);
            font-weight: 500;
            margin-bottom: 0.4rem;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.12rem 0;
            color: var(--text);
        }

        .legend-swatch {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px solid white;
            box-shadow: 0 0 0 1px rgba(0,0,0,0.15);
            flex-shrink: 0;
        }

        .legend-star {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #888;
            border: 2px solid var(--star);
            box-shadow: 0 0 0 1px rgba(0,0,0,0.15);
            flex-shrink: 0;
        }

        @media (max-width: 768px) {
            .header { padding: 1rem; }
            .map-info { padding: 0.5rem 1rem; }
            #map { height: calc(100vh - 100px); }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>Property <span>Finder</span></h1>
    <div class="header-actions">
        <a href="/" class="btn btn-ghost">Grid View</a>
        <a href="/map" class="btn btn-ghost active">Map View</a>
        <a href="/emails" class="btn btn-ghost">Emails</a>
    </div>
</div>

<div class="map-info">
    <span>Showing <strong>{{ properties|length }}</strong> properties on map</span>
    {% if stats.active > properties|length %}
    <span>({{ stats.active - properties|length }} properties could not be mapped — missing postcode)</span>
    {% endif %}
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script>
    const map = L.map('map').setView([52.1, -2.7], 9);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
        maxZoom: 18,
    }).addTo(map);

    const markers = L.markerClusterGroup({
        maxClusterRadius: 40,
        spiderfyOnMaxZoom: true,
        showCoverageOnHover: false,
    });

    const SOURCE_COLORS = {
        rightmove:      '#00d06b',
        zoopla:         '#7d4bc3',
        onthemarket:    '#e74c3c',
        uklandandfarms: '#8b6c3e',
        smallholdingsforsale: '#c98a2d',
        primelocation:  '#1f6feb',
        other:          '#6b6b6b',
    };

    function sourceColor(source) {
        return SOURCE_COLORS[source] || SOURCE_COLORS.other;
    }

    function makeIcon(source, starred) {
        const color = sourceColor(source);
        const strokeColor = starred ? '#d4a843' : '#ffffff';
        const strokeWidth = starred ? 3 : 2;
        const svg = `
            <svg width="30" height="42" viewBox="0 0 30 42" xmlns="http://www.w3.org/2000/svg">
                <path d="M15 0C6.7 0 0 6.7 0 15c0 11 15 27 15 27s15-16 15-27C30 6.7 23.3 0 15 0z"
                      fill="${color}" stroke="${strokeColor}" stroke-width="${strokeWidth}"/>
                <circle cx="15" cy="14" r="5" fill="#ffffff"/>
            </svg>
        `;
        return L.divIcon({
            html: svg,
            className: 'custom-marker',
            iconSize: [30, 42],
            iconAnchor: [15, 42],
            popupAnchor: [0, -38],
        });
    }

    const properties = {{ properties | tojson }};

    properties.forEach(p => {
        const priceStr = p.price ? '£' + p.price.toLocaleString() : 'Price TBC';
        const imgHtml = (p.image_url && p.image_url !== 'none')
            ? `<img src="${p.image_url}" alt="" onerror="this.style.display='none'">`
            : '';

        const metaParts = [];
        if (p.bedrooms) metaParts.push(p.bedrooms + ' bed' + (p.bedrooms !== 1 ? 's' : ''));
        if (p.acres) metaParts.push(p.acres + ' acres');
        if (p.location) metaParts.push(p.location);

        const popup = `
            <div class="property-popup">
                ${imgHtml}
                <span class="popup-source" style="background:${sourceColor(p.source)}">${p.source}</span>
                <div class="popup-price">${priceStr}</div>
                <div class="popup-title">${p.title || 'Untitled property'}</div>
                <div class="popup-meta">${metaParts.join(' · ')}</div>
                ${p.url ? `<a href="${p.url}" target="_blank" rel="noopener">View listing &rarr;</a>` : ''}
            </div>
        `;

        const marker = L.marker(
            [p.latitude, p.longitude],
            { icon: makeIcon(p.source, p.starred) }
        ).bindPopup(popup, { maxWidth: 300 });
        markers.addLayer(marker);
    });

    // Build legend showing only sources present in the data
    const presentSources = [...new Set(properties.map(p => p.source))].sort();
    if (presentSources.length > 0) {
        const legend = document.createElement('div');
        legend.className = 'map-legend';
        const items = presentSources.map(src =>
            `<div class="legend-item">
                <span class="legend-swatch" style="background:${sourceColor(src)}"></span>
                ${src}
            </div>`
        ).join('');
        const starredRow = properties.some(p => p.starred)
            ? `<div class="legend-item"><span class="legend-star"></span>starred</div>`
            : '';
        legend.innerHTML = `<h4>Sources</h4>${items}${starredRow}`;
        document.body.appendChild(legend);
    }

    map.addLayer(markers);

    if (properties.length > 0) {
        map.fitBounds(markers.getBounds().pad(0.1));
    }
</script>
</body>
</html>
